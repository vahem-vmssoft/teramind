[workspace]
resolver = "2"
members = [
    "crates/teramind-core",
    "crates/teramind-ipc",
    "crates/teramind-db",
    "crates/teramindd",
    "crates/teramind",
    "crates/teramind-hook",
    "crates/teramind-mcp",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
rust-version = "1.93.0"

[workspace.dependencies]
anyhow      = "1"
thiserror   = "2"
serde       = { version = "1", features = ["derive"] }
serde_json  = "1"
tokio       = { version = "1", features = ["full"] }
tracing     = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
tracing-appender   = "0.2"
uuid        = { version = "1", features = ["v4", "v5", "serde"] }
time        = { version = "0.3", features = ["serde", "macros", "formatting", "parsing"] }
clap        = { version = "4", features = ["derive", "env"] }
sqlx        = { version = "0.8.6", default-features = false, features = ["runtime-tokio-rustls", "postgres", "uuid", "time", "json", "macros", "migrate"] }
postgresql_embedded = { version = "0.20", features = ["blocking"] }
interprocess = { version = "2", features = ["tokio"] }
notify      = "8.2.0"
regex       = "1"
once_cell   = "1"
sha2        = "0.11"
hex         = "0.4"
async-trait = "0.1"
futures     = "0.3"
tempfile    = "3"
proptest    = "1"
rmcp        = { version = "1.7", features = ["server", "transport-io"] }

[profile.release]
lto = "thin"
codegen-units = 1
