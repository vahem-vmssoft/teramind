name: search-eval
on:
  pull_request:
    paths:
      - "crates/teramind-db/src/repos/search.rs"
      - "crates/teramindd/src/services/search.rs"
      - "crates/teramind-search-eval/**"
      - "benches/search-eval/**"
  schedule:
    - cron: "0 6 * * 1"   # weekly Monday 06:00 UTC
  workflow_dispatch: {}

# Read-only token: this workflow runs on pull_request, so PR-supplied code
# executes here. Scope the token to the minimum.
permissions:
  contents: read

jobs:
  eval:
    name: run L5 benchmark
    runs-on: ubuntu-24.04
    # Postgres + pgvector at localhost:5432. The eval harness honours
    # TERAMIND_TEST_PG_URL and routes through this instead of bootstrapping
    # embedded PG (which needs network access to GitHub releases for the
    # binary + pgvector tarballs, tripping the unauthenticated rate limit).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TERAMIND_TEST_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v5
      # Reclaim preinstalled SDKs (~25 GB) — the fastembed/ort dep graph plus
      # release artifacts exceed the runner's default free space.
      - name: free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/local/share/powershell /usr/share/swift
          df -h /
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: run benchmark
        env:
          TERAMIND_LOG: warn
        run: cargo run --release -p teramind-search-eval -- run
      - name: detect rebaseline marker
        id: rebaseline
        shell: bash
        # Bind untrusted PR body to an env var rather than interpolating it
        # into the script (avoids shell injection from a crafted PR body).
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ] && \
             printf '%s' "$PR_BODY" | grep -q '\[eval-baseline-update\]'; then
            echo "permitted=true" >> "$GITHUB_OUTPUT"
          else
            echo "permitted=false" >> "$GITHUB_OUTPUT"
          fi
      - name: compare against baseline
        if: steps.rebaseline.outputs.permitted != 'true'
        run: cargo run --release -p teramind-search-eval -- compare-baseline
      - name: report (rebaseline mode)
        if: steps.rebaseline.outputs.permitted == 'true'
        run: |
          echo "PR opted into [eval-baseline-update]; gates SKIPPED."
          echo "Reviewer must inspect the new baseline.json in the diff."
      - uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard
          path: |
            benches/search-eval/eval-results.json
            benches/search-eval/eval-scorecard.md
          if-no-files-found: error

  eval-semantic:
    name: run L5 benchmark (semantic)
    needs: eval
    runs-on: ubuntu-24.04
    continue-on-error: true   # fail-soft until v1.0.1 corpus expansion
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      TERAMIND_TEST_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v5
      # Reclaim preinstalled SDKs (~25 GB) — the fastembed/ort dep graph plus
      # release artifacts exceed the runner's default free space.
      - name: free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
            /usr/local/share/powershell /usr/share/swift
          df -h /
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install ollama
        run: curl -fsSL https://ollama.ai/install.sh | sh
      - name: start ollama and pull model
        run: |
          ollama serve &
          sleep 5
          ollama pull nomic-embed-text-v2-moe
      - name: run semantic benchmark
        env:
          TERAMIND_LOG: warn
        run: cargo run --release -p teramind-search-eval -- run --semantic
      - name: compare against semantic baseline
        run: |
          cargo run --release -p teramind-search-eval -- compare-baseline \
            --results  benches/search-eval/eval-results-semantic.json \
            --baseline benches/search-eval/baseline-semantic.json
      - uses: actions/upload-artifact@v4
        with:
          name: eval-scorecard-semantic
          path: |
            benches/search-eval/eval-results-semantic.json
            benches/search-eval/eval-scorecard-semantic.md
          if-no-files-found: error
