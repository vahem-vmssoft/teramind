name: ci
on:
  pull_request:
  push:
    branches: [main]

# Lock the workflow's GITHUB_TOKEN to read-only. Even if a malicious PR
# managed to exfiltrate the token, the token can only do what these
# permissions allow.
permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-24.04
    # Postgres + pgvector available at localhost:5432 for the duration of the
    # job. Tests set TERAMIND_TEST_PG_URL so the shared fixture uses this
    # instead of bootstrapping embedded PG (which is slow + needs network
    # access to GitHub releases for the binary tarball).
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: cache cargo
        uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      # The shared fixture honours TERAMIND_TEST_PG_URL and routes through
      # the pgvector/pgvector service container, so cargo test does not
      # need GITHUB_TOKEN. We deliberately do NOT export the token into
      # these steps: PR-supplied test code runs in the same step and would
      # be able to read it from the env otherwise. One test that still uses
      # embedded PG directly (teramind-search-eval corpus) is `#[ignore]`d
      # in CI; see crates/teramind-search-eval/src/corpus.rs.
      - name: unit tests
        env:
          TERAMIND_TEST_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
        run: cargo test --workspace --lib --bins
      - name: integration tests
        env:
          TERAMIND_TEST_PG_URL: postgres://postgres:postgres@localhost:5432/postgres
          TERAMIND_LOG: warn
        run: cargo test --workspace --test '*'

  lint-scripts:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck install.sh
        run: shellcheck installer/install.sh

  lint-ps1:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser
          $issues = Invoke-ScriptAnalyzer -Path installer/install.ps1 -Severity Warning,Error
          $issues | Format-Table
          if ($issues.Count -gt 0) { exit 1 }
